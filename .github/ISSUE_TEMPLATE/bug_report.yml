name: Bug 反馈
description: 反馈导出、导入、界面、安装或打包问题
title: "[Bug] "
labels: ["bug", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请先搜索已有 Issue/PR，避免重复反馈同一个问题。

        请不要上传 Cookie、账号密码、App Secret、Token、API Key、私人知识库内容等敏感信息。
  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前确认
      options:
        - label: 我已经搜索过已有 Issue 和 PR，没有找到相同问题。
          required: true
        - label: 我已经确认日志、截图和样例中不包含 Cookie、Token、账号密码、App Secret、API Key 等敏感信息。
          required: true
  - type: dropdown
    id: platform
    attributes:
      label: 涉及平台
      options:
        - 知识星球
        - 语雀
        - 飞书
        - 阿里云 Thoughts
        - 印象笔记
        - 有道云笔记
        - OneNote
        - 为知笔记
        - ima 知识库
        - Notion 教程
        - 桌面端界面
        - 打包/安装
        - Provider 插件机制
        - 其他
    validations:
      required: true
  - type: dropdown
    id: action
    attributes:
      label: 涉及能力
      options:
        - 导出
        - 导入
        - 登录/保存凭证
        - 读取目录
        - 图片/附件
        - 目录结构
        - 任务中心/断点续跑
        - 设置
        - 教程公告
        - 安装/启动
        - 其他
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 发生了什么？预期应该是什么？
      placeholder: 例如：语雀导入时部分 Markdown 创建成功，但有 2 篇图片没有上传。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请写清楚如何复现，方便定位。
      placeholder: |
        1. 打开 Wandao
        2. 进入平台中心，选择 ...
        3. 点击 ...
        4. 出现 ...
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: 实际结果
      description: 可以写错误提示、失败数量、缺失图片数量、导入导出效果等。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 你认为正确结果应该是什么？
  - type: textarea
    id: log
    attributes:
      label: 运行日志或错误报告
      description: 建议使用软件里的“复制错误报告”。请先确认已脱敏。
      render: text
  - type: input
    id: version
    attributes:
      label: 万能导版本
      placeholder: 例如：v1.2.0 / main 分支 commit id
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 系统环境
      placeholder: 例如：Windows 11 / macOS 15 / Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: 脱敏样例或截图
      description: 可补充目录结构、Markdown 片段、截图。请不要上传私人数据。
  - type: dropdown
    id: willing
    attributes:
      label: 是否愿意协助修复或测试
      options:
        - 愿意协助测试
        - 愿意认领修复
        - 暂时只能反馈问题
        - 其他
