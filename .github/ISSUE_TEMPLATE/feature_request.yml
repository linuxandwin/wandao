name: 功能建议
description: 建议已有平台增强、UI 优化、任务中心、设置或体验改进
title: "[Feature] "
labels: ["enhancement", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出建议。请尽量描述真实使用场景，而不只是功能名。

        如果是新增平台，请优先使用“新平台共创/认领”模板。
  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前确认
      options:
        - label: 我已经搜索过已有 Issue 和 PR，没有找到相同建议。
          required: true
        - label: 这个建议不是新增平台；如果是新增平台，我会改用“新平台共创/认领”模板。
          required: true
  - type: dropdown
    id: scope
    attributes:
      label: 功能范围
      options:
        - 已有平台导出增强
        - 已有平台导入增强
        - 图片/附件处理
        - 目录选择/目录结构
        - 任务中心/断点续跑/失败重试
        - 桌面端界面
        - 设置
        - 教程公告
        - 打包/安装/更新
        - Provider 插件机制
        - 文档教程
        - 其他
    validations:
      required: true
  - type: input
    id: related_platform
    attributes:
      label: 相关平台
      description: 如果只影响某个平台，请写平台名；不涉及平台可写“无”。
      placeholder: 例如：语雀 / 飞书 / 无
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你想解决什么问题？
      placeholder: 例如：我想批量导出某平台内容，但失败后只能从头开始，希望可以重试失败项。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望功能
      description: 你希望万能导怎么支持？
      placeholder: 例如：任务中心里显示失败项，并提供“只重试失败项”的按钮。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你尝试过的替代方案
      description: 可以写目前如何绕过、人工怎么做、已有工具怎么处理。
  - type: textarea
    id: examples
    attributes:
      label: 示例或参考
      description: 可以提供公开页面、截图、参考工具或你期望的输出结构。请不要提供敏感信息。
  - type: dropdown
    id: willing
    attributes:
      label: 是否愿意认领实现
      options:
        - 愿意认领开发
        - 愿意协助测试
        - 暂时只提供建议
        - 其他
  - type: textarea
    id: extra
    attributes:
      label: 其他补充
