name: Build Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wandao_electron/package-lock.json

      - name: Install dependencies
        working-directory: wandao_electron
        run: npm ci

      - name: Build Windows
        if: runner.os == 'Windows'
        working-directory: wandao_electron
        shell: powershell
        run: |
          $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          npx electron-builder --win --publish never "-c.win.signAndEditExecutable=false" "-c.win.signDlls=false"

      - name: Build macOS
        if: runner.os == 'macOS'
        working-directory: wandao_electron
        run: |
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          npx electron-builder --mac --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wandao-${{ runner.os }}
          path: |
            wandao_electron/dist/*.exe
            wandao_electron/dist/*.zip
            wandao_electron/dist/*.blockmap
          if-no-files-found: ignore
